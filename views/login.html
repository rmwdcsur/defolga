<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
  </head>
  <body>
    <h2>Login with Google</h2>

    <button id="googleLoginButton">Login with Google</button>

    <script>
      // When the user clicks the button, redirect them to Google OAuth
      document
        .getElementById("googleLoginButton")
        .addEventListener("click", () => {
          window.location.href = "/auth/google"; // Redirect to your OAuth login route
        });
    </script>
  </body>
</html>
